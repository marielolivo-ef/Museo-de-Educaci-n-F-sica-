<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Museo de la Historia de la Educación Física</title>
<meta name="description" content="Recorrido inmersivo por la historia de la Educación Física, sala por sala, activado con etiquetas NFC en el aula." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --wall:#122019; --wall-2:#18291F; --panel:#1E3227; --line:#2C4436;
    --ivory:#EFE7D6; --ivory-dim:#B9C3B2; --muted:#8CA091;
    --brass:#C8A24B; --brass-2:#E0BE69; --brass-deep:#9E7C33;
    --kinetic:#54D2C4; --clay:#B5613A;
    --display:"Fraunces",Georgia,serif;
    --body:"Inter",system-ui,sans-serif;
    --mono:"Space Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;background:var(--wall);color:var(--ivory);font-family:var(--body);-webkit-font-smoothing:antialiased;}
  body{min-height:100dvh;}
  a{color:inherit;}
  ::selection{background:var(--brass);color:var(--wall);}

  /* textura sutil de muro de galería */
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(120% 80% at 50% -10%, rgba(200,162,75,0.08), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 5px);}

  .stage{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:0 20px;}

  /* ====== barra superior ====== */
  header.top{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--wall),rgba(18,32,25,.86));
    border-bottom:1px solid var(--line);backdrop-filter:blur(6px);}
  .top-in{max-width:920px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px;}
  .glyph{width:34px;height:34px;flex:none;border-radius:50%;border:1.5px solid var(--brass);position:relative;}
  .glyph::before,.glyph::after{content:"";position:absolute;inset:0;margin:auto;}
  .glyph::before{width:15px;height:15px;border:1.5px solid var(--kinetic);border-radius:50%;top:-3px;left:0;right:0;}
  .glyph::after{width:3px;height:3px;background:var(--brass);border-radius:50%;top:0;bottom:0;left:0;right:0;}
  .top h1{font-family:var(--display);font-weight:600;font-size:15px;letter-spacing:.01em;margin:0;line-height:1.1;}
  .top .k{font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--kinetic);margin:0 0 2px;}
  .home-link{margin-left:auto;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:7px 13px;white-space:nowrap;}
  .home-link:hover{color:var(--ivory);border-color:var(--brass);}

  /* ====== HUB ====== */
  .hero{padding:54px 0 30px;text-align:center;}
  .hero .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--brass);margin:0 0 18px;}
  .hero h2{font-family:var(--display);font-weight:600;font-size:clamp(34px,7vw,60px);line-height:1.02;letter-spacing:-.01em;margin:0 auto;max-width:14ch;}
  .hero h2 em{font-style:italic;color:var(--brass);}
  .hero p{max-width:52ch;margin:20px auto 0;color:var(--ivory-dim);font-size:16px;line-height:1.6;}

  .kinetic-rule{max-width:920px;margin:34px auto;height:44px;position:relative;}
  .kinetic-rule svg{width:100%;height:100%;display:block;}
  .kinetic-rule .trace{stroke:var(--kinetic);stroke-width:2;fill:none;stroke-dasharray:6 10;
    animation:flow 6s linear infinite;}
  @keyframes flow{to{stroke-dashoffset:-160;}}

  .rooms{display:flex;flex-direction:column;gap:14px;padding:6px 0 22px;}
  .room{display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:center;
    background:linear-gradient(180deg,var(--wall-2),var(--panel));border:1px solid var(--line);
    border-radius:14px;padding:18px 20px;text-decoration:none;color:inherit;
    transition:border-color .18s ease, transform .18s ease;}
  .room:hover{border-color:var(--brass);transform:translateY(-2px);}
  .room .num{font-family:var(--display);font-weight:600;font-size:32px;color:var(--brass);line-height:1;}
  .room .rt .era{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--kinetic);margin:0 0 4px;}
  .room .rt h3{font-family:var(--display);font-weight:600;font-size:20px;margin:0 0 3px;line-height:1.15;}
  .room .rt p{margin:0;color:var(--muted);font-size:13px;line-height:1.4;}
  .room .go{font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;}

  /* Panel NFC */
  .nfc{margin:14px 0 60px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;}
  .nfc h4{font-family:var(--display);font-weight:600;font-size:18px;margin:0 0 4px;}
  .nfc .sub{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}
  .nfc-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line);}
  .nfc-row .lab{font-family:var(--mono);font-size:11px;color:var(--brass);white-space:nowrap;min-width:58px;}
  .nfc-row .url{font-family:var(--mono);font-size:11.5px;color:var(--ivory-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .nfc-row button{font-family:var(--mono);font-size:11px;color:var(--wall);background:var(--brass);border:none;border-radius:7px;padding:7px 11px;cursor:pointer;white-space:nowrap;}
  .nfc-row button:active{transform:translateY(1px);}
  .nfc-row button.copied{background:var(--kinetic);}

  /* ====== ESTACIÓN ====== */
  .exhibit{padding:30px 0 40px;}
  .plaque{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:8px;}
  .plaque .cat{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--brass);}
  .plaque .era{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--kinetic);}
  .plaque .dates{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;}
  .exhibit h2{font-family:var(--display);font-weight:600;font-size:clamp(30px,6vw,50px);line-height:1.04;letter-spacing:-.01em;margin:6px 0 0;}

  .art{margin:26px 0;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:linear-gradient(180deg,var(--wall-2),#0E1813);position:relative;}
  .art svg{width:100%;height:auto;display:block;}

  .listen{display:inline-flex;align-items:center;gap:10px;font-family:var(--body);font-weight:600;font-size:14px;
    background:var(--brass);color:var(--wall);border:none;border-radius:999px;padding:11px 18px;cursor:pointer;margin-bottom:22px;}
  .listen:active{transform:translateY(1px);}
  .listen.playing{background:var(--kinetic);}
  .listen svg{display:block;}

  .prose p{font-size:16.5px;line-height:1.75;color:var(--ivory);margin:0 0 16px;max-width:64ch;}
  .prose p .drop{font-family:var(--display);font-weight:600;color:var(--brass);}
  .prose .lead{font-size:19px;color:var(--ivory);}

  /* Línea de tiempo */
  .timeline{margin:30px 0;border-left:2px solid var(--line);padding-left:22px;}
  .timeline h4{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--kinetic);margin:0 0 16px;}
  .tl-item{position:relative;padding:0 0 18px 4px;}
  .tl-item::before{content:"";position:absolute;left:-29px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--brass);border:2px solid var(--wall);}
  .tl-item .year{font-family:var(--mono);font-size:13px;color:var(--brass);font-weight:700;}
  .tl-item .ev{font-size:15px;color:var(--ivory-dim);margin-top:2px;line-height:1.45;}

  /* Galería / media */
  .media{margin:28px 0;}
  .media h4{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--kinetic);margin:0 0 14px;}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
  .gallery img{width:100%;height:150px;object-fit:cover;border-radius:10px;border:1px solid var(--line);display:block;}
  .slot{border:1px dashed var(--line);border-radius:10px;height:150px;display:flex;align-items:center;justify-content:center;
    text-align:center;color:var(--muted);font-size:12px;padding:12px;line-height:1.4;font-family:var(--mono);}
  .videowrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;border:1px solid var(--line);}
  .videowrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}
  model-viewer{width:100%;height:340px;border-radius:12px;border:1px solid var(--line);background:#0E1813;}

  /* navegación entre salas */
  .navpair{display:flex;gap:12px;margin:36px 0 10px;}
  .navpair a{flex:1;text-decoration:none;color:inherit;border:1px solid var(--line);border-radius:12px;padding:14px 16px;transition:border-color .18s ease;}
  .navpair a:hover{border-color:var(--brass);}
  .navpair .dir{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .navpair .t{font-family:var(--display);font-size:16px;margin-top:3px;color:var(--ivory);}
  .navpair .next{text-align:right;}
  .navpair .disabled{opacity:.3;pointer-events:none;}

  footer{border-top:1px solid var(--line);padding:26px 0 40px;text-align:center;color:var(--muted);font-size:12px;font-family:var(--mono);letter-spacing:.06em;}

  @media (max-width:560px){
    .room{grid-template-columns:48px 1fr;gap:12px;}
    .room .go{display:none;}
    .plaque .dates{margin-left:0;width:100%;}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;}
    .kinetic-rule .trace{animation:none;}
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-in">
    <div class="glyph"></div>
    <div>
      <p class="k">Museo virtual</p>
      <h1>Historia de la Educación Física</h1>
    </div>
    <a class="home-link" href="#inicio">Entrada</a>
  </div>
</header>

<main class="stage" id="app"><!-- render dinámico --></main>

<footer id="foot"></footer>

<script>
/* =========================================================================
   CONTENIDO DEL MUSEO  —  edita aquí libremente.
   Cada "sala" es una estación con su propio enlace (#e1, #e2, ...).
   - parrafos: el texto de la placa (también es lo que se lee en voz alta).
   - timeline: hitos con año y hecho.
   - fotos:  pega URLs de tus imágenes (déjalo [] para usar la ilustración).
   - video:  pega un enlace de YouTube EMBED (ej. https://www.youtube.com/embed/ID) o deja "".
   - modelo: pega la URL de un .glb para AR/3D o deja "".
   ========================================================================= */
const SALAS = [
  {
    id:"e1", num:"01", era:"Antigüedad", fechas:"≈ 3000 a.C. – 393 d.C.",
    sala:"El cuerpo educado",
    titulo:"El cuerpo educado en la Antigüedad",
    parrafos:[
      "Mucho antes de que existiera la palabra “deporte”, las grandes civilizaciones ya entendían que educar el cuerpo era educar a la persona. En China, la India y Egipto se practicaban formas de ejercicio ligadas a la salud, la guerra y lo espiritual.",
      "Pero fue en la Antigua Grecia donde el movimiento se volvió parte central de la educación. En la palestra y el gimnasio, los jóvenes cultivaban la fuerza, la destreza y la belleza del cuerpo como camino hacia la areté: la excelencia. Los Juegos Olímpicos antiguos, celebrados en Olimpia desde el 776 a.C., coronaban ese ideal.",
      "Roma heredó parte de esa cultura, aunque con un sentido más militar y utilitario. Con la caída del mundo clásico y la prohibición de los Juegos hacia el 393 d.C., aquella visión del cuerpo entró en una larga pausa."
    ],
    timeline:[
      {year:"≈776 a.C.", ev:"Primeros Juegos Olímpicos registrados en Olimpia."},
      {year:"s. V a.C.", ev:"Auge de la palestra y el gimnasio en la educación griega."},
      {year:"s. II d.C.", ev:"Galeno escribe sobre el ejercicio y la salud."},
      {year:"≈393 d.C.", ev:"Se prohíben los Juegos Olímpicos antiguos."}
    ],
    fotos:[], video:"", modelo:""
  },
  {
    id:"e2", num:"02", era:"Edad Media y Renacimiento", fechas:"s. V – s. XVII",
    sala:"Del olvido al renacer",
    titulo:"Del olvido al renacer",
    parrafos:[
      "Durante buena parte de la Edad Media, la educación del cuerpo quedó en segundo plano frente a la vida espiritual. El ejercicio sobrevivió sobre todo en el entrenamiento de los caballeros y en los juegos populares.",
      "El Renacimiento trajo una mirada nueva. Los humanistas recuperaron el ideal clásico de equilibrio entre cuerpo y mente. Vittorino da Feltre, en su escuela “La Casa Alegre”, incorporó el ejercicio físico a la formación de los jóvenes como algo esencial, no accesorio.",
      "En 1569, el médico Girolamo Mercuriale publicó “De arte gymnastica”, considerada una de las primeras obras que estudia el ejercicio de forma sistemática. El cuerpo volvía, poco a poco, al centro de la educación."
    ],
    timeline:[
      {year:"s. V–XIV", ev:"El ejercicio persiste en la formación caballeresca y los juegos populares."},
      {year:"1378–1446", ev:"Vittorino da Feltre integra el ejercicio en la educación humanista."},
      {year:"1569", ev:"Mercuriale publica “De arte gymnastica”."}
    ],
    fotos:[], video:"", modelo:""
  },
  {
    id:"e3", num:"03", era:"Siglo XIX", fechas:"1793 – 1900",
    sala:"Las grandes escuelas",
    titulo:"Las grandes escuelas gimnásticas",
    parrafos:[
      "El siglo XIX es el nacimiento de la Educación Física moderna. En Europa surgieron “escuelas” que definieron formas distintas de entender el movimiento, y cuya influencia todavía sentimos hoy.",
      "En Alemania, GutsMuths sentó las bases con su “Gymnastik für die Jugend” (1793), y Friedrich Ludwig Jahn impulsó el Turnen, una gimnasia de aparatos con sentido cívico. En Suecia, Per Henrik Ling creó una gimnasia analítica y correctiva, fundando en 1813 su instituto en Estocolmo. En Francia, Francisco Amorós llevó la gimnasia a la enseñanza pública.",
      "Mientras tanto, en Inglaterra, educadores como Thomas Arnold convirtieron el deporte y el juego en herramientas de formación del carácter. De esa raíz nacería buena parte del deporte moderno."
    ],
    timeline:[
      {year:"1793", ev:"GutsMuths publica “Gymnastik für die Jugend” (Alemania)."},
      {year:"1811", ev:"Jahn abre el primer campo de gimnasia (Turnplatz) en Berlín."},
      {year:"1813", ev:"Ling funda el Instituto Central de Gimnasia (Suecia)."},
      {year:"1828–1841", ev:"Thomas Arnold impulsa el deporte educativo en Rugby (Inglaterra)."}
    ],
    fotos:[], video:"", modelo:""
  },
  {
    id:"e4", num:"04", era:"Siglo XX", fechas:"1894 – 2000",
    sala:"El siglo olímpico",
    titulo:"El siglo olímpico",
    parrafos:[
      "En 1894, el pedagogo francés Pierre de Coubertin fundó el Comité Olímpico Internacional, y en 1896 se celebraron en Atenas los primeros Juegos Olímpicos modernos. El ideal antiguo renacía, ahora a escala mundial.",
      "A lo largo del siglo XX, la Educación Física se institucionalizó: entró en los sistemas escolares de casi todos los países, se profesionalizó la formación de docentes y se desarrollaron las ciencias del movimiento —fisiología, biomecánica, pedagogía del deporte—.",
      "La EF dejó de ser solo gimnasia para convertirse en un área educativa completa, orientada a la salud, la formación integral y la participación de todos, no solo de los atletas."
    ],
    timeline:[
      {year:"1894", ev:"Coubertin funda el Comité Olímpico Internacional."},
      {year:"1896", ev:"Primeros Juegos Olímpicos modernos, en Atenas."},
      {year:"s. XX", ev:"La Educación Física se generaliza en los sistemas escolares."},
      {year:"s. XX", ev:"Se consolidan las ciencias del movimiento (biomecánica, fisiología)."}
    ],
    fotos:[], video:"", modelo:""
  },
  {
    id:"e5", num:"05", era:"El Caribe y RD", fechas:"1926 – hoy",
    sala:"La EF en el Caribe y RD",
    titulo:"La Educación Física en el Caribe y República Dominicana",
    parrafos:[
      "En América Latina y el Caribe, la Educación Física se afianzó a lo largo del siglo XX ligada a la escuela pública, a la salud y al orgullo deportivo regional. En 1926 se celebraron en México los primeros Juegos Centroamericanos y del Caribe, la competencia regional más antigua de su tipo.",
      "En la República Dominicana, la Educación Física es hoy parte del currículo escolar y cuenta con instituciones dedicadas a su desarrollo y a la formación docente, como el INEFI. Generaciones de maestras y maestros han llevado el movimiento a las aulas de todo el país.",
      "Esta historia sigue viva y en construcción: cada clase, cada evento y cada estudiante en movimiento es un nuevo capítulo. En 2026, Santo Domingo es sede de los XXV Juegos Centroamericanos y del Caribe, uniendo el legado antiguo con el presente dominicano."
    ],
    timeline:[
      {year:"1926", ev:"Primeros Juegos Centroamericanos y del Caribe (Ciudad de México)."},
      {year:"s. XX", ev:"La Educación Física entra al currículo escolar dominicano."},
      {year:"Actual", ev:"El INEFI impulsa la EF y la formación docente en RD."},
      {year:"2026", ev:"Santo Domingo, sede de los XXV Juegos Centroamericanos y del Caribe."}
    ],
    // Nota para ti: aquí puedes añadir fechas y datos locales que conozcas
    // (fundación del INEFI, hitos de la EF dominicana, etc.).
    fotos:[], video:"", modelo:""
  }
];

/* ====== Ilustraciones (SVG originales por sala) ====== */
function art(id){

    '<rect x="176" y="70" width="24" height="150"/><rect x="176" y="60" width="24" height="10"/><rect x="168" y="220" width="40" height="12"/>'+
    '<rect x="232" y="70" width="24" height="150"/><rect x="232" y="60" width="24" height="10"/><rect x="224" y="220" width="40" height="12"/>'+
    '<rect x="104" y="46" width="160" height="14"/></g>'+
    '<g fill="'+I+'"><circle cx="470" cy="90" r="16"/>'+
    '<path d="M470 106 C 450 130, 500 130, 520 150 C 540 130, 500 175, 470 170 C 440 175, 420 150, 440 150 C 455 135, 450 120, 470 106 Z"/></g>'+
    '<circle cx="590" cy="150" r="46" fill="none" stroke="'+K+'" stroke-width="3"/>'+
    '<circle cx="590" cy="150" r="30" fill="none" stroke="'+B+'" stroke-width="2" stroke-dasharray="4 5"/>'+
    trace+'</svg>';
  if(id==="e2") return '<svg '+base+'>'+
    '<path d="M120 90 L120 220 L280 200 L280 70 Z" fill="none" stroke="'+B+'" stroke-width="3"/>'+
    '<path d="M480 90 L480 220 L320 200 L320 70 Z" fill="none" stroke="'+B+'" stroke-width="3"/>'+
    '<line x1="300" y1="66" x2="300" y2="210" stroke="'+B+'" stroke-width="3"/>'+
    '<g stroke="'+M+'" stroke-width="1.5">'+
    '<line x1="140" y1="110" x2="262" y2="96"/><line x1="140" y1="130" x2="262" y2="116"/><line x1="140" y1="150" x2="262" y2="136"/>'+
    '<line x1="338" y1="96" x2="460" y2="110"/><line x1="338" y1="116" x2="460" y2="130"/><line x1="338" y1="136" x2="460" y2="150"/></g>'+

  if(id==="e3") return '<svg '+base+'>'+

    '<line x1="150" y1="160" x2="330" y2="160"/></g>'+
    '<g stroke="'+K+'" stroke-width="4" fill="none"><line x1="420" y1="120" x2="560" y2="120"/>'+
    '<line x1="430" y1="120" x2="430" y2="210"/><line x1="550" y1="120" x2="550" y2="210"/>'+
    '<ellipse cx="490" cy="120" rx="70" ry="16"/></g>'+
    '<g fill="'+I+'"><path d="M620 140 q10 -30 20 0 q-10 40 -20 0" /><path d="M660 140 q10 -30 20 0 q-10 40 -20 0"/></g>'+
    trace+'</svg>';
  if(id==="e4") return '<svg '+base+'>'+
    '<g fill="none" stroke-width="4">'+
    '<circle cx="330" cy="130" r="40" stroke="'+B+'"/><circle cx="400" cy="130" r="40" stroke="'+K+'"/><circle cx="470" cy="130" r="40" stroke="'+I+'"/>'+
    '<circle cx="365" cy="175" r="40" stroke="'+B+'"/><circle cx="435" cy="175" r="40" stroke="'+K+'"/></g>'+
    '<g><rect x="150" y="120" width="14" height="90" fill="'+B+'"/>'+
    '<path d="M141 120 q16 -46 32 0 q-16 -14 -32 0Z" fill="'+K+'"/>'+
    '<path d="M150 120 q7 -26 14 0Z" fill="'+I+'"/></g>'+trace+'</svg>';
  return '<svg '+base+'>'+ /* e5 */
    '<path d="M120 170 q30 -40 80 -30 q40 -30 90 -6 q50 -10 70 20 q40 6 30 40 q-60 26 -140 18 q-90 8 -140 -10 q-30 -20 -10 -42Z" fill="none" stroke="'+B+'" stroke-width="3"/>'+
    '<circle cx="300" cy="150" r="4" fill="'+K+'"/><circle cx="360" cy="140" r="4" fill="'+K+'"/><circle cx="250" cy="165" r="4" fill="'+K+'"/>'+
    '<g stroke="'+I+'" stroke-width="4" fill="none" stroke-linecap="round">'+
    '<circle cx="560" cy="80" r="12" fill="'+I+'"/><line x1="560" y1="92" x2="558" y2="130"/>'+
    '<line x1="558" y1="105" x2="590" y2="95"/><line x1="558" y1="105" x2="532" y2="120"/>'+
    '<line x1="558" y1="130" x2="588" y2="150"/><line x1="558" y1="130" x2="532" y2="150"/></g>'+
    '<g stroke="'+B+'" stroke-width="2"><line x1="620" y1="60" x2="640" y2="60"/><line x1="630" y1="50" x2="630" y2="70"/></g>'+
    trace+'</svg>';
}

/* ====== Router ====== */
const app=document.getElementById('app');
const foot=document.getElementById('foot');
const byId=id=>SALAS.find(s=>s.id===id);

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;');}

function renderHub(){
  stopVoice();
  const base=location.origin+location.pathname;
  let rooms=SALAS.map(s=>(
    '<a class="room" href="#'+s.id+'">'+
      '<div class="num">'+s.num+'</div>'+
      '<div class="rt"><p class="era">'+esc(s.era)+'</p><h3>'+esc(s.sala)+'</h3>'+
      '<p>'+esc(s.fechas)+'</p></div>'+
      '<div class="go">Entrar →</div>'+
    '</a>')).join('');
  let nfc=SALAS.map(s=>(
    '<div class="nfc-row"><span class="lab">Sala '+s.num+'</span>'+
    '<span class="url" id="u-'+s.id+'">'+esc(base)+'#'+s.id+'</span>'+
    '<button data-u="'+esc(base)+'#'+s.id+'">Copiar</button></div>')).join('');

  app.innerHTML=
    '<section class="hero">'+
      '<p class="eyebrow">Recorrido inmersivo</p>'+
      '<h2>La historia del <em>movimiento</em>, sala por sala</h2>'+
      '<p>Un museo para recorrer en el aula. Coloca cada estación en un punto del salón y actívala acercando el teléfono a su etiqueta. Cinco salas, del gimnasio griego a las aulas dominicanas.</p>'+
    '</section>'+
    '<div class="kinetic-rule"><svg viewBox="0 0 900 44" xmlns="http://www.w3.org/2000/svg"><path class="trace" d="M10 22 C 160 4, 260 40, 420 20 S 740 6, 890 26" /></svg></div>'+
    '<nav class="rooms">'+rooms+'</nav>'+
    '<section class="nfc">'+
      '<h4>Enlaces para las etiquetas NFC</h4>'+
      '<p class="sub">Graba cada enlace en la etiqueta NFC de su estación. Al acercar el teléfono, se abrirá esa sala directamente.</p>'+
      nfc+
    '</section>';
  foot.textContent='Museo de la Historia de la Educación Física · recorrido de aula';

  app.querySelectorAll('.nfc-row button').forEach(b=>b.addEventListener('click',()=>{
    navigator.clipboard.writeText(b.dataset.u).then(()=>{
      b.textContent='¡Copiado!';b.classList.add('copied');
      setTimeout(()=>{b.textContent='Copiar';b.classList.remove('copied');},1400);
    });
  }));
  window.scrollTo(0,0);
}

function renderSala(s){
  stopVoice();
  const i=SALAS.indexOf(s);
  const prev=SALAS[i-1], next=SALAS[i+1];

  let tl=s.timeline.map(t=>('<div class="tl-item"><div class="year">'+esc(t.year)+'</div><div class="ev">'+esc(t.ev)+'</div></div>')).join('');

  let media='';
  // galería
  let cells='';
  if(s.fotos && s.fotos.length){
    cells=s.fotos.map(u=>'<img src="'+esc(u)+'" alt="" loading="lazy">').join('');
  }else{
    cells='<div class="slot">Añade tus fotos en la lista “fotos” de esta sala</div>';
  }
  media+='<div class="media"><h4>Galería</h4><div class="gallery">'+cells+'</div></div>';
  // video
  if(s.video){
    media+='<div class="media"><h4>Video</h4><div class="videowrap"><iframe src="'+esc(s.video)+'" allowfullscreen loading="lazy"></iframe></div></div>';
  }
  // modelo 3D / AR
  if(s.modelo){
    media+='<div class="media"><h4>Pieza en 3D · AR</h4><model-viewer src="'+esc(s.modelo)+'" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" shadow-intensity="1"></model-viewer></div>';
  }

  let parr=s.parrafos.map((p,idx)=>('<p class="'+(idx===0?'lead':'')+'">'+esc(p)+'</p>')).join('');

  app.innerHTML=
    '<article class="exhibit">'+
      '<div class="plaque"><span class="cat">CAT. '+s.num+'</span><span class="era">'+esc(s.era)+'</span><span class="dates">'+esc(s.fechas)+'</span></div>'+
      '<h2>'+esc(s.titulo)+'</h2>'+
      '<div class="art">'+art(s.id)+'</div>'+
      '<button class="listen" id="listen"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg><span>Escuchar la sala</span></button>'+
      '<div class="prose">'+parr+'</div>'+
      '<div class="timeline"><h4>Línea de tiempo</h4>'+tl+'</div>'+
      media+
      '<div class="navpair">'+
        (prev?'<a href="#'+prev.id+'"><div class="dir">← Sala anterior</div><div class="t">'+esc(prev.sala)+'</div></a>':'<a class="disabled"><div class="dir">— Inicio —</div><div class="t">Primera sala</div></a>')+
        (next?'<a class="next" href="#'+next.id+'"><div class="dir">Sala siguiente →</div><div class="t">'+esc(next.sala)+'</div></a>':'<a class="next disabled"><div class="dir">Fin del recorrido</div><div class="t">Última sala</div></a>')+
      '</div>'+
    '</article>';
  foot.textContent='Sala '+s.num+' · '+s.sala;

  const speech=s.parrafos.join(' ');
  const btn=document.getElementById('listen');
  btn.addEventListener('click',()=>toggleVoice(speech,btn));
  window.scrollTo(0,0);

  // cargar model-viewer solo si hace falta
  if(s.modelo && !window.__mvLoaded){
    const sc=document.createElement('script');sc.type='module';
    sc.src='https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js';
    document.head.appendChild(sc);window.__mvLoaded=true;
  }
}

/* ====== Narración por voz ====== */
let voiceBtn=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  return vs.find(v=>/es(-|_)?(DO|MX|US|ES|419)/i.test(v.lang)) || vs.find(v=>/^es/i.test(v.lang)) || null;
}
function toggleVoice(text,btn){
  if(speechSynthesis.speaking && voiceBtn===btn){ stopVoice(); return; }
  stopVoice();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES'; u.rate=.96; u.pitch=1;
  const v=pickVoice(); if(v)u.voice=v;
  u.onend=()=>setBtn(btn,false);
  voiceBtn=btn; setBtn(btn,true);
  speechSynthesis.speak(u);
}
function stopVoice(){ if(window.speechSynthesis){speechSynthesis.cancel();} if(voiceBtn)setBtn(voiceBtn,false); voiceBtn=null; }
function setBtn(btn,on){ if(!btn)return; btn.classList.toggle('playing',on);
  btn.querySelector('span').textContent=on?'Detener':'Escuchar la sala'; }
if(window.speechSynthesis){ speechSynthesis.onvoiceschanged=()=>{}; }

/* ====== arranque ====== */
function route(){
  const h=(location.hash||'#inicio').slice(1);
  const s=byId(h);
  if(s) renderSala(s); else renderHub();
}
window.addEventListener('hashchange',route);
route();
</script>
